<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ ARISE SYSTEM</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

/* HIDE */
.hidden{
display:none;
}

/* INTRO */
#intro{
position:relative;
height:100vh;
}

#intro img{
width:100%;
height:100vh;
object-fit:cover;
opacity:0.7;
}

/* CENTER TEXT */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

/* BUTTON */
button{
padding:12px 20px;
background:yellow;
border:none;
margin-top:20px;
font-weight:bold;
cursor:pointer;
}

/* APP UI */
#app{
padding:20px;
}

/* POPUP */
#levelPopup{
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
background:#001f3f;
padding:20px;
border:2px solid cyan;
box-shadow:0 0 20px cyan;
z-index:999;
}
</style>

</head>

<body>

<!-- ⚡ INTRO SCREEN -->
<div id="intro">
<img src="eyes.png">

<div class="center">
<h1>You have been chosen...</h1>
<button id="startBtn">TAP TO START</button>
</div>
</div>

<!-- ⚡ LOGIN SCREEN -->
<div id="login" class="hidden">
<h2>⚡ Login</h2>
<button id="loginBtn">Continue with Google</button>
</div>

<!-- ⚡ MAIN APP -->
<div id="app" class="hidden">

<h2>⚡ ARISE SYSTEM</h2>

<p>Welcome Player <span id="userName">...</span></p>

<p>XP: <span id="xp">0</span></p>

<button onclick="addXP()">🔥 Complete Task</button>

<br><br>

<button onclick="logout()">Logout</button>

</div>

<!-- ⚡ LEVEL POPUP -->
<div id="levelPopup" class="hidden">
<h2 id="popupText">+XP</h2>
</div>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<!-- 🔥 YOUR SCRIPT -->
<script src="script.js"></script>

</body>
</html>
