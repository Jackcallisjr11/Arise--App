<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ ARISE SYSTEM</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <img src="eyes.png" id="introImg">
  <div class="center">
    <h1>You have been chosen...</h1>
    <button onclick="startApp()">TAP TO START</button>
  </div>
</div>

<!-- LOGIN -->
<div id="login" class="hidden">
  <button onclick="login()">Continue with Google</button>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">

  <div class="top">
    <span>XP: <span id="xp">0</span></span>
    <span>Level: <span id="level">1</span></span>
    <span>Rank: <span id="rank">E</span></span>
  </div>

  <h3>Welcome <span id="userName"></span></h3>

  <div class="tasks">
    <div onclick="openTask('Wake Up',20)">🌅 Wake Up</div>
    <div onclick="openTask('Study',30)">📚 Study</div>
    <div onclick="openTask('Workout',25)">🏃 Workout</div>
    <div onclick="openTask('No Phone',20)">📵 No Phone</div>
  </div>

  <button onclick="logout()">Logout</button>

</div>

<!-- TASK POPUP -->
<div id="taskPopup" class="hidden">
  <h2 id="taskTitle"></h2>
  <p id="taskXP"></p>
  <button onclick="completeTask()">Complete</button>
</div>

<!-- LEVEL UP -->
<div id="levelPopup" class="hidden">
  ⚡ LEVEL UP ⚡
</div>

<script src="script.js"></script>

</body>
</html>
