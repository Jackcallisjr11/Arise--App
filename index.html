<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARISE ⚡</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <img src="eyes.png" id="eyes">

  <div class="introText">
    <h1>You have been chosen...</h1>
    <button id="startBtn">TAP TO START</button>
  </div>
</div>

<!-- LOGIN -->
<div id="login" class="hidden">
  <h2>⚡ System Activation</h2>
  <button id="loginBtn">Continue with Google</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="topbar">
    <div>⚡ XP: <span id="xp">0</span> | LVL: <span id="lvl">1</span></div>
    <div id="userName"></div>
  </div>

  <div id="questPanel">
    <h2>DAILY QUEST</h2>

    <div class="quest" onclick="openTask('water')">💧 Drink Water</div>
    <div class="quest" onclick="openTask('wakeup')">🌅 Wake Up</div>
    <div class="quest" onclick="openTask('study')">📚 Study</div>
  </div>

</div>

<!-- TASK POPUP -->
<div id="taskPopup" class="hidden">
  <div class="box">
    <h2 id="taskTitle"></h2>
    <p id="gainText"></p>
    <input id="taskInput" placeholder="Enter value">
    <button onclick="completeTask()">Complete</button>
  </div>
</div>

<!-- LEVEL POPUP -->
<div id="levelPopup" class="hidden">
  <div class="box">
    <h2>⚡ SYSTEM ⚡</h2>
    <p id="popupText"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
