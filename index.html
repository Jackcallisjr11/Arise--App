<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ ARISE SYSTEM</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>

<body>

<div id="intro">
  <h1>⚡ ARISE</h1>
  <button onclick="startApp()">TAP TO START</button>
</div>

<div id="login" class="hidden">
  <button onclick="login()">Continue with Google</button>
</div>

<div id="app" class="hidden">

  <div class="top">
    <span>XP: <span id="xp">0</span></span>
    <span>Level: <span id="level">1</span></span>
    <span>Rank: <span id="rank">E</span></span>
  </div>

  <h3>Welcome <span id="userName"></span></h3>

  <div class="tasks">
    <div onclick="task(this)">Wake Up</div>
    <div onclick="task(this)">Study</div>
    <div onclick="task(this)">Workout</div>
    <div onclick="task(this)">No Phone</div>
  </div>

  <button onclick="logout()">Logout</button>

</div>

<script src="script.js"></script>

</body>
</html>
